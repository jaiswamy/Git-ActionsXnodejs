name: nodejs-cicd

on :
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Build frontend Docker Image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: false
        tags: jaicswamy962/frontend:latest
        script: |
          cd frontend/
          docker build -t jaicswamy962/frontend:latest .

    - name: Build backend Docker Image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: false
        tags: jaicswamy962/backend:latest
        script: |
          cd backend/
          docker build -t jaicswamy962/backend:latest .

    - name: trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: jaicswamy962/frontend:latest     
        image-ref: jaicswamy962/backend:latest

    - name: login to docker hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: jaicswamy962/frontend:latest
        script: |
          cd frontend/
          docker push jaicswamy962/frontend:latest
          docker push jaicswamy962/backend:latest

  deploy:
    environment: production
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy to aws
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_SSH_KEY }}
        script: |
          cd root/
          docker pull jaicswamy962/frontend:latest
          docker pull jaicswamy962/backend:latest
          
          git clone https://github.com/jaiswamy/Git-ActionsXnodejs.git
          cd Git-ActionsXnodejs/
          docker-compose up -d 

          sync; echo 3 > /proc/sys/vm/drop_caches
          docker system prune -a --volumes -f