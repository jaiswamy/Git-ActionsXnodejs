name: nodejs-cicd

on :
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Build frontend Docker Image
      uses: docker/build-push-action@v2
      with:
        context: ./frontend
        push: false
        tags: jaicswamy962/frontend:latest
        

    - name: Build backend Docker Image
      uses: docker/build-push-action@v2
      with:
        context: ./backend
        push: false
        tags: jaicswamy962/backend:latest
      

    - name: trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: jaicswamy962/frontend:latest

    - name: trivy scan
      uses: aquasecurity/trivy-action@master
      with:     
        image-ref: jaicswamy962/backend:latest

    - name: login to docker hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      uses: docker/build-push-action@v2
      with:
        context: ./frontend
        push: true
        tags: jaicswamy962/frontend:latest

    - name: Push Docker Image
      uses: docker/build-push-action@v2
      with:
        context: ./backend
        push: true
        tags: jaicswamy962/backend:latest
        

  deploy:
    environment: production
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy to aws
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_SSH_KEY }}
        script: |
          if [ ! -d "Git-ActionsXnodejs" ]; then
            git clone https://github.com/jaiswamy/Git-ActionsXnodejs.git
          fi

          cd Git-ActionsXnodejs

          git pull origin main

          docker pull jaicswamy962/frontend:latest
          docker pull jaicswamy962/backend:latest
          docker compose down
          docker compose up -d
          docker system prune -f