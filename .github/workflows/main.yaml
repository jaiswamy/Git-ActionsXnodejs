name: nodejs-cicd

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: jaicswamy962/frontend:latest2

      - name: Build backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: jaicswamy962/backend:latest2

      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: jaicswamy962/frontend:latest2

      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: jaicswamy962/backend:latest2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: jaicswamy962/frontend:latest2

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: jaicswamy962/backend:latest2


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            if [ ! -d "Git-ActionsXnodejs" ]; then
              git clone https://github.com/jaiswamy/Git-ActionsXnodejs.git
            fi

            cd Git-ActionsXnodejs
            git pull origin main

            docker pull jaicswamy962/frontend:latest2
            docker pull jaicswamy962/backend:latest2

            docker compose down
            docker compose up -d --force-recreate

            docker system prune -f


